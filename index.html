<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Reminder Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar with title and live clock -->
  <header class="top-bar">
    <h1>📝 Task Reminder Dashboard</h1>
    <div id="timerClock"></div>
  </header>

  <div class="dashboard-container">

    <!-- Add Task -->
    <section class="dashboard-box small">
      <h2>➕ Add Task</h2>
      <form id="taskForm">
        <input type="text" id="taskName" placeholder="Task name..." required>
        <textarea id="taskDesc" placeholder="Description..."></textarea>
        <input type="datetime-local" id="taskTime" required>
        <input type="text" id="taskIcon" placeholder="Icon URL (optional)">
        <select id="taskRepeat">
          <option value="none">No Repeat</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <div id="repeatOptions"></div>
        <button type="submit">Add</button>
      </form>
    </section>

    <!-- Today’s Work (in place of Recurring Tasks) -->
    <section class="dashboard-box small">
      <h2>📌 Today’s Work</h2>
      <input type="text" id="searchToday" placeholder="Search by title or date">
      <ul id="todayList"></ul>
    </section>

    <!-- Upcoming Tasks -->
    <section class="dashboard-box tall">
      <h2>📅 Upcoming Tasks</h2>
      <ul id="taskList"></ul>
    </section>

    <!-- Pending Tasks -->
    <section class="dashboard-box tall">
      <h2>⏳ Pending Tasks</h2>
      <ul id="pendingList"></ul>
    </section>

    <!-- Completed Tasks -->
    <section class="dashboard-box large">
      <h2>✅ Completed Tasks</h2>
      <ul id="completedList"></ul>
    </section>

    <!-- Deleted Tasks -->
    <section class="dashboard-box large">
      <h2>🗑️ Deleted Tasks</h2>
      <ul id="deletedList"></ul>
    </section>

    <!-- Recurring Tasks (moved below Add Task if you still want it) -->
    <section class="dashboard-box large">
      <h2>🔄 Recurring Tasks</h2>
      <ul id="recurringList"></ul>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
